# bind named-conf
# master : 1.1.1.
# slave : 1.1.1.2
#--------------------------------------#

// This is the primary configuration file for the BIND DNS server named.
//
// Please read /usr/share/doc/bind9/README.Debian for information on the
// structure of BIND configuration files in Debian, *BEFORE* you customize
// this configuration file.
//
// If you are just adding zones, please do that in /etc/bind/named.conf.local

//include "/etc/bind/named.conf.options";
//include "/etc/bind/named.conf.local";
//include "/etc/bind/named.conf.default-zones";
//include "/etc/bind/rndc-key";
/////////////////////////////////////////////////////////////////////////////////////////////////
// generated by named-bootconf.pl

options {
        directory "/var/cache/bind";  # runtime 디렉토리
        dump-file "/etc/bind/data/cache_dump.db";
        statistics-file "/etc/bind/data/named_stats.txt";
        allow-transfer     { localhost; };
        allow-recursion { 127.0.0.1;218.145.68.0/1.1.1.0/24;2.2.2.0/24;3.3.3.0/24;1.2.1.0/24; };
        auth-nxdomain no;
        listen-on-v6 { any; };
        version "Welcome~";
        /*
         * If there is a firewall between you and nameservers you want
         * to talk to, you might need to uncomment the query-source
         * directive below.  Previous versions of BIND always asked
         * questions using port 53, but BIND 8.1 uses an unprivileged
         * port by default.
         */
        // query-source address * port 53;
        /* chacheing nameserver▒▒ ▒▒▒▒▒ ▒ϵ▒▒▒ ▒ϴ▒ query▒▒ ▒▒▒▒Ѵ▒. */
        allow-query { any; };

        // DDOS Protection
        rate-limit { nxdomains-per-second 3; ipv4-prefix-length 32; slip 2; };


};

//
// rndc
//
//key "rndc-key" {
//        algorithm hmac-md5;
//        secret "KG4JMJ+Crz4SyHUiTcVpag==";
//};

include "/etc/bind/rndc.key";

controls {
      inet 127.0.0.1 port 953
              allow { 127.0.0.1; } keys { "rndc-key"; };
};

logging {
    channel "__default_syslog" {
    // Send most of the named messages to syslog.
        syslog local2;
        severity debug;
    };

    // log channel list
    channel default_log {
        file "/logs/named/default.log" versions 1 size 1m;
        severity debug ;
        print-category yes;
        print-severity yes;
        print-time yes;
    };

    channel config_log {
        file "/logs/named/config.log"  versions 3 size 20m;
        severity debug;
        print-category yes;
        print-severity yes;
        print-time yes;
    };

    channel queries_log {
        file "/logs/named/queries.log"  versions 1 size 500m;
        severity dynamic;
        print-category yes;
        print-severity yes;
        print-time yes;
    };

    channel notify_log {
        file "/logs/named/notify.log"  versions 3 size 20m;
        severity debug;
        print-category yes;
        print-severity yes;
        print-time yes;
    };

    channel security_log {
        file "/logs/named/security.log"  versions 3 size 20m;
        severity debug;
        print-category yes;
        print-severity yes;
        print-time yes;
    };

    channel lame-servers_log {
        file "/logs/named/lame-servers.log"  versions 1 size 1m;
        severity debug;
        print-category yes;
        print-severity yes;
        print-time yes;
    };

    channel rate-limit_log {
        file "/logs/named/rate-limit.log"  versions 3 size 20m;
        severity debug;
        print-category yes;
        print-severity yes;
        print-time yes;
    };

     category default { default_log; };
     category config { config_log; };
     category queries { queries_log; };
     category notify { notify_log; };
     category security { security_log; };
     category lame-servers { lame-servers_log; };
     category rate-limit { rate-limit_log; };

 };


