/* a caching only nameserver config */
zone "." IN { type hint; file "/etc/bind/zone/named.root"; };
//zone "." IN { type hint; file "/etc/bind/db.root"; };

/* local network configuration */
//zone "localhost" IN { type master; file "/etc/bind/zone/localhost.zone"; allow-update { none; }; };

// test.com.zone
zone "test.co.kr" IN { type master; file "/etc/bind/zone/test/test.co.kr.zone"; allow-update { none;}; allow-transfer { 1.1.1.2; 1.1.1.1; 127.0.0.1; }; notify yes; also-notify { 1.1.1.2; }; zone-statistics yes; };
zone "test.news.co.kr" IN { type master; file "/etc/bind/zone/test/test.news.co.kr.zone"; allow-update { none;}; allow-transfer {  1.1.1.2; 1.1.1.1; 127.0.0.1; }; notify yes; also-notify { 1.1.1.2; }; zone-statistics yes; };
zone "test.com" IN { type master; file "/etc/bind/zone/test/test.com.zone"; allow-update { none;}; allow-transfer {  1.1.1.2; 1.1.1.1; 127.0.0.1; }; notify yes; also-notify { 1.1.1.2; }; zone-statistics yes; };

// reverse zone
zone "0.0.127.in-addr.arpa" IN { type master; file "/etc/bind/zone/127.0.0.rev"; allow-update { none;}; allow-transfer { 1.1.1.2; 1.1.1.1; 127.0.0.1; }; notify yes; also-notify { 1.1.1.2; }; zone-statistics yes; };
zone "1.168.192.in-addr.arpa" IN { type master; file "/etc/bind/zone/192.168.1.rev"; allow-update { none;}; allow-transfer { 1.1.1.2; 1.1.1.1; 127.0.0.1; }; notify yes; also-notify { 1.1.1.2; }; zone-statistics yes; };
zone "2.168.192.in-addr.arpa" IN { type master; file "/etc/bind/zone/192.168.2.rev"; allow-update { none;}; allow-transfer { 1.1.1.2; 1.1.1.1; 127.0.0.1; }; notify yes; also-notify { 1.1.1.2; }; zone-statistics yes; };
